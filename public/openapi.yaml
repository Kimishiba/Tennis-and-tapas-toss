openapi: 3.1.0
info:
  title: Tennis and Tapas Toss API
  description: >
    API for managing weekly Tennis and Tapas social tournaments. Features player registration, 
    Google OAuth and local authentication, weekly session management, automated rotating pairing generation, 
    scoring, WhatsApp notifications, and player insights.
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://localhost:3000
    description: Local development server
paths:
  /api/auth/google/client-id:
    get:
      summary: Get Google Client ID
      operationId: getGoogleClientId
      description: Retrieve the Google Client ID configured on the server for frontend Google Sign-In initialization.
      tags:
        - Authentication
      security: []
      responses:
        '200':
          description: Google Client ID configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  clientId:
                    type: string
                    example: 1234567890-abcdef.apps.googleusercontent.com
        '500':
          description: Server configuration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/register:
    post:
      summary: Register a new player
      operationId: registerPlayer
      description: Create a new player profile with username, password, gender, level, and optional avatar picture.
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Full name of the player
                  example: Alessandro Longoni
                gender:
                  type: string
                  enum: [M, F]
                  description: Gender of the player
                  example: M
                level:
                  type: integer
                  minimum: 1
                  maximum: 9
                  description: Play level (1 to 9)
                  example: 5
                username:
                  type: string
                  format: email
                  description: Unique username (email address)
                  example: player@example.com
                password:
                  type: string
                  format: password
                  description: Account password
                  example: mysecretpassword
                picture:
                  type: string
                  format: binary
                  description: Avatar image file (jpeg, jpg, png, gif, webp; max 5MB)
              required:
                - name
                - gender
                - level
                - username
                - password
      responses:
        '201':
          description: Registration successful, returns JWT token and user profile details
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT bearer token valid for 30 days
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/PlayerProfile'
        '400':
          description: Missing or invalid parameters, or username already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/login:
    post:
      summary: Login with username & password
      operationId: loginPlayer
      description: Authenticate a player using username and password to retrieve a JWT token.
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  format: email
                  description: Email username
                  example: player@example.com
                password:
                  type: string
                  format: password
                  description: Password
                  example: mysecretpassword
              required:
                - username
                - password
      responses:
        '200':
          description: Login successful, returns JWT token and user profile details
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  user:
                    $ref: '#/components/schemas/PlayerProfile'
        '400':
          description: Missing username/password or invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/google:
    post:
      summary: Google OAuth Authentication
      operationId: loginGoogle
      description: >
        Authenticate using a Google OAuth ID Token. If the user doesn't exist, it checks if there is 
        an account with the same email to link Google ID. Otherwise, registration is triggered. 
        If gender or level are missing during first registration, registrationIncomplete is returned.
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id_token:
                  type: string
                  description: Verify token obtained from Google Sign-In
                  example: AIzaSyD...
                gender:
                  type: string
                  enum: [M, F]
                  description: Required for new users to complete registration
                  example: M
                level:
                  type: integer
                  minimum: 1
                  maximum: 9
                  description: Required for new users to complete registration
                  example: 5
              required:
                - id_token
      responses:
        '200':
          description: Authentication successful or registration registrationIncomplete prompt
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      user:
                        $ref: '#/components/schemas/PlayerProfile'
                  - type: object
                    properties:
                      registrationIncomplete:
                        type: boolean
                        example: true
                      googleInfo:
                        type: object
                        properties:
                          googleId:
                            type: string
                            example: "10987654321"
                          email:
                            type: string
                            format: email
                            example: googleuser@example.com
                          name:
                            type: string
                            example: Google User
                          picture:
                            type: string
                            format: uri
                            example: https://lh3.googleusercontent.com/a/AATXAJ...
        '400':
          description: Missing ID token, validation failures, or verification error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server configuration or connection error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/profile:
    get:
      summary: Get player profile
      operationId: getProfile
      description: Retrieve the authenticated user's profile information.
      tags:
        - Player Profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile details returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/PlayerProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update player profile
      operationId: updateProfile
      description: Update user profile fields including name, gender, level, username, and optional profile image upload.
      tags:
        - Player Profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Updated full name
                  example: Alessandro Longoni
                gender:
                  type: string
                  enum: [M, F]
                  description: Updated gender
                  example: M
                level:
                  type: integer
                  minimum: 1
                  maximum: 9
                  description: Updated level (1 to 9)
                  example: 6
                username:
                  type: string
                  format: email
                  description: Updated email address
                  example: newemail@example.com
                picture:
                  type: string
                  format: binary
                  description: Updated profile image file
              required:
                - name
                - gender
                - level
                - username
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profile updated successfully
        '400':
          description: Missing fields, validation error, or email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Server database error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/push/public-key:
    get:
      summary: Get Web Push public key
      operationId: getPushPublicKey
      description: Retrieve the VAPID public key required for the client-side push notification subscription.
      tags:
        - Push Notifications
      security: []
      responses:
        '200':
          description: VAPID public key
          content:
            application/json:
              schema:
                type: object
                properties:
                  publicKey:
                    type: string
                    example: BEl38...
        '500':
          description: Web Push environment not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/push/subscribe:
    post:
      summary: Subscribe to Web Push notifications
      operationId: subscribePush
      description: Store the web push subscription detail object for the authenticated player.
      tags:
        - Push Notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subscription:
                  type: object
                  description: Standard Web Push Subscription object
                  example:
                    endpoint: https://fcm.googleapis.com/fcm/send/e-R3a...
                    keys:
                      p256dh: BLm...
                      auth: wQp...
              required:
                - subscription
      responses:
        '200':
          description: Subscription saved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Push subscription saved successfully
        '400':
          description: Missing subscription object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/players:
    get:
      summary: Get all players (Admin only)
      operationId: getAllPlayers
      description: Retrieve the complete list of players with differentiated display names.
      tags:
        - Administration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of players returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  players:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Alessandro L.
                        gender:
                          type: string
                          enum: [M, F]
                          example: M
                        level:
                          type: integer
                          example: 6
                        username:
                          type: string
                          example: player@example.com
                        is_admin:
                          type: integer
                          enum: [0, 1]
                          example: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions:
    post:
      summary: Create session (Admin only)
      operationId: createSession
      description: Open a new social tournament session. Only one active/open session is permitted at a time.
      tags:
        - Administration
        - Tournament Sessions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                date:
                  type: string
                  description: Human-readable date of the session
                  example: Sunday, Jun 14, 2026
              required:
                - date
      responses:
        '201':
          description: Session created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    example: 2
                  date:
                    type: string
                    example: Sunday, Jun 14, 2026
                  status:
                    type: string
                    enum: [open]
                    example: open
        '400':
          description: Missing date or another active session already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/current:
    get:
      summary: Get current session details
      operationId: getCurrentSession
      description: Fetch the current open or active session, including roster signups and published matches.
      tags:
        - Tournament Sessions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current session summary. Session can be null if no open/active session exists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    oneOf:
                      - type: "null"
                      - type: object
                        properties:
                          id:
                            type: integer
                            example: 1
                          date:
                            type: string
                            example: Sunday, Jun 14, 2026
                          status:
                            type: string
                            enum: [open, active, completed]
                            example: open
                  signups:
                    type: array
                    items:
                      type: object
                      properties:
                        player_id:
                          type: integer
                          example: 2
                        status:
                          type: string
                          enum: [pending, approved]
                          example: pending
                        name:
                          type: string
                          example: Alessandro L.
                        gender:
                          type: string
                          example: M
                        level:
                          type: integer
                          example: 6
                  matches:
                    type: array
                    items:
                      $ref: '#/components/schemas/MatchDetails'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{id}/complete:
    post:
      summary: Complete a session (Admin only)
      operationId: completeSession
      description: Mark a session's status as completed, freezing historical scores and details.
      tags:
        - Administration
        - Tournament Sessions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the session to complete
          schema:
            type: integer
      responses:
        '200':
          description: Session marked as completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Session completed successfully. History saved.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{id}/signup:
    post:
      summary: Signup for session
      operationId: signupSession
      description: Self check-in for the current open session. Player is registered as 'pending' by default.
      tags:
        - Tournament Sessions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the session
          schema:
            type: integer
      responses:
        '201':
          description: Signup request received
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Successfully checked in for the toss session
        '400':
          description: Session no longer open, or player is already signed up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{id}/approve:
    post:
      summary: Approve player registration (Admin only)
      operationId: approveSignup
      description: Approve or set the signup status of a player, or delete their signup using status 'removed'.
      tags:
        - Administration
        - Tournament Sessions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the session
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                player_id:
                  type: integer
                  description: The ID of the player to approve or modify
                  example: 5
                status:
                  type: string
                  enum: [approved, pending, removed]
                  description: New signup status. 'removed' deletes the signup row.
                  example: approved
              required:
                - player_id
                - status
      responses:
        '200':
          description: Signup status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Player registration set to approved
        '400':
          description: Missing required properties
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '404':
          description: Session or player signup not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{id}/add-player:
    post:
      summary: Create guest player and sign up (Admin only)
      operationId: addGuestPlayer
      description: Create a dummy guest player profile and immediately add them to the session's approved list.
      tags:
        - Administration
        - Tournament Sessions
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the session
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Full name of the guest player
                  example: Guest User
                gender:
                  type: string
                  enum: [M, F]
                  description: Gender
                  example: F
                level:
                  type: integer
                  minimum: 1
                  maximum: 9
                  description: Play level (1 to 9)
                  example: 4
              required:
                - name
                - gender
                - level
      responses:
        '201':
          description: Guest player created and checked in successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Player created and added to session
        '400':
          description: Validation errors or invalid gender/level
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/fill-players:
    post:
      summary: Fill session with mock players (Admin only)
      operationId: fillMockPlayers
      description: Generate mock players and auto-signup/approve them in the session for testing and staging matches.
      tags:
        - Administration
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                count:
                  type: integer
                  default: 16
                  description: Number of mock players to inject
                  example: 16
      responses:
        '200':
          description: Mock players injected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Successfully added 16 approved players on top of the roster
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/clear-database:
    post:
      summary: Reset database (Admin only)
      operationId: clearDatabase
      description: Danger zone endpoint. Deletes all sessions, signups, matches, and non-admin players from the DB.
      tags:
        - Administration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reset confirmation message
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Database cleared successfully. All sessions, signups, matches, and non-admin players have been reset.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/whatsapp-status:
    get:
      summary: Get WhatsApp Status (Admin only)
      operationId: getWhatsAppStatus
      description: Retrieve the connection status and QR code string for WhatsApp integration.
      tags:
        - Administration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Connection state details
          content:
            application/json:
              schema:
                type: object
                properties:
                  isConnected:
                    type: boolean
                    example: false
                  qr:
                    type: [string, "null"]
                    description: Base64 or raw text representation of the pairing QR code
                    example: 2@c12S...
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{id}/generate-round:
    post:
      summary: Draft pairings for next round (Admin only)
      operationId: generateRound
      description: Compute optimal combinations of 4 players per court for the next round of matches based on play history.
      tags:
        - Administration
        - Rounds and Pairings
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the session
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                courtsConfig:
                  type: array
                  description: Configuration for active courts
                  minItems: 1
                  maxItems: 4
                  items:
                    type: object
                    properties:
                      courtNumber:
                        type: string
                        example: "1"
                    required:
                      - courtNumber
                rules:
                  type: object
                  properties:
                    balanceLevels:
                      type: boolean
                      default: true
                    preferMixed:
                      type: boolean
                      default: true
                    avoidRepeats:
                      type: boolean
                      default: true
              required:
                - courtsConfig
      responses:
        '200':
          description: Generated draft pairings object
          content:
            application/json:
              schema:
                type: object
                properties:
                  round_number:
                    type: integer
                    example: 1
                  pairings:
                    type: array
                    items:
                      type: object
                      properties:
                        court:
                          type: string
                          example: "1"
                        player1:
                          $ref: '#/components/schemas/DraftPlayer'
                        player2:
                          $ref: '#/components/schemas/DraftPlayer'
                        player3:
                          $ref: '#/components/schemas/DraftPlayer'
                        player4:
                          $ref: '#/components/schemas/DraftPlayer'
        '400':
          description: Invalid courts setup or zero approved players in the session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{id}/publish-round:
    post:
      summary: Publish draft round (Admin only)
      operationId: publishRound
      description: Write draft pairings to the database, dispatch Web Push notifications to devices, and notify WhatsApp group.
      tags:
        - Administration
        - Rounds and Pairings
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the session
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                round_number:
                  type: integer
                  example: 1
                pairings:
                  type: array
                  minItems: 1
                  maxItems: 4
                  items:
                    type: object
                    properties:
                      court:
                        type: string
                        example: "1"
                      player1:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                        required: [id]
                      player2:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                        required: [id]
                      player3:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                        required: [id]
                      player4:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                        required: [id]
                    required: [court, player1, player2, player3, player4]
              required:
                - round_number
                - pairings
      responses:
        '200':
          description: Round successfully stored and notifications broadcasted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Round 1 published successfully and notifications sent
        '400':
          description: Invalid round numbers, player isn't approved, or duplicate player assignments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error (transactions roll back on failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/matches/{id}/score:
    put:
      summary: Update match score
      operationId: updateMatchScore
      description: Record or edit scores for a match. Restricted to admins or players who played in the match.
      tags:
        - Matches
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: The ID of the match to score
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                team_a_score:
                  type: integer
                  description: Points won by Team A (Player 1 + Player 2)
                  example: 6
                team_b_score:
                  type: integer
                  description: Points won by Team B (Player 3 + Player 4)
                  example: 4
              required:
                - team_a_score
                - team_b_score
      responses:
        '200':
          description: Score successfully written
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Score updated successfully
        '400':
          description: Missing scores in request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Access denied. Current user is not an Admin and did not participate in this match.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Match ID does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/players:
    get:
      summary: Get non-admin player records (Admin only)
      operationId: getAdminPlayers
      description: Return all non-admin players in alphabetical order, detailing username as email.
      tags:
        - Administration
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of players returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  players:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 2
                        name:
                          type: string
                          example: Sofia Perez
                        email:
                          type: string
                          example: sofia@example.com
                        gender:
                          type: string
                          enum: [M, F]
                          example: F
                        level:
                          type: integer
                          example: 4
                        picture_path:
                          type: [string, "null"]
                          example: /uploads/avatar-123456.png
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/AdminRequired'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/players/me/insights:
    get:
      summary: Get authenticated player stats & insights
      operationId: getPlayerInsights
      description: Returns aggregate games statistics, streaks, best partner, toughest rival, and custom achievement badges.
      tags:
        - Statistics
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Player personal tournament performance stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalPlayed:
                    type: integer
                    example: 12
                  totalWins:
                    type: integer
                    example: 7
                  currentStreak:
                    type: integer
                    example: 2
                  maxStreak:
                    type: integer
                    example: 4
                  bestPartner:
                    oneOf:
                      - type: "null"
                      - type: object
                        properties:
                          name:
                            type: string
                            example: Sofia Perez
                          winRate:
                            type: integer
                            description: Percentage of games won together
                            example: 75
                          played:
                            type: integer
                            example: 4
                          wins:
                            type: integer
                            example: 3
                  toughestRival:
                    oneOf:
                      - type: "null"
                      - type: object
                        properties:
                          name:
                            type: string
                            example: Alessandro Longoni
                          winRateAgainst:
                            type: integer
                            description: Percentage of games won against this rival
                            example: 25
                          played:
                            type: integer
                            example: 4
                          losses:
                            type: integer
                            example: 3
                  badges:
                    type: array
                    items:
                      type: string
                    example: ["Toss Enthusiast 🎾", "Toss Regular 🏆", "Winner's Circle 🥇", "On Fire 🔥"]
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/leaderboard:
    get:
      summary: Fetch leaderboard
      operationId: getLeaderboard
      description: Retrieve computed overall or daily ('today') player standings based on wins, points diff, and points scored.
      tags:
        - Statistics
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          required: false
          description: Standing scope. Select 'today' for the current session or omit/use 'overall' for all-time data.
          schema:
            type: string
            enum: [today, overall]
      responses:
        '200':
          description: Standing leaderboard list returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaderboard:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Alessandro L.
                        gender:
                          type: string
                          enum: [M, F]
                          example: M
                        level:
                          type: integer
                          example: 6
                        picture_path:
                          type: [string, "null"]
                          example: /uploads/avatar-123.png
                        played:
                          type: integer
                          example: 15
                        wins:
                          type: integer
                          example: 10
                        losses:
                          type: integer
                          example: 5
                        pointsWon:
                          type: integer
                          example: 90
                        pointsLost:
                          type: integer
                          example: 70
                        diff:
                          type: integer
                          description: Points won minus points lost
                          example: 20
                        winRate:
                          type: integer
                          description: Rounded win rate percentage
                          example: 67
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter the `token` string received from the registration/login endpoint.
  schemas:
    PlayerProfile:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Alessandro Longoni
        username:
          type: string
          format: email
          example: player@example.com
        gender:
          type: string
          enum: [M, F]
          example: M
        level:
          type: integer
          minimum: 1
          maximum: 9
          example: 6
        picture_path:
          type: [string, "null"]
          description: Relative path to upload directory or full URL if OAuth registration
          example: /uploads/avatar-1718357022-38472.png
        is_admin:
          type: integer
          enum: [0, 1]
          description: Admin privilege indicator (0 = standard player, 1 = admin)
          example: 0
    DraftPlayer:
      type: object
      properties:
        id:
          type: integer
          example: 3
        name:
          type: string
          example: Richard M.
        gender:
          type: string
          enum: [M, F]
          example: M
        level:
          type: integer
          example: 5
    MatchDetails:
      type: object
      properties:
        id:
          type: integer
          example: 12
        session_id:
          type: integer
          example: 2
        round_number:
          type: integer
          example: 1
        court:
          type: integer
          example: 1
        player1:
          type: integer
          example: 3
        player2:
          type: integer
          example: 4
        player3:
          type: integer
          example: 5
        player4:
          type: integer
          example: 6
        team_a_score:
          type: [integer, "null"]
          example: 6
        team_b_score:
          type: [integer, "null"]
          example: 4
        p1_name:
          type: string
          example: Richard M.
        p1_gender:
          type: string
          example: M
        p1_level:
          type: integer
          example: 5
        p2_name:
          type: string
          example: Alessandro L.
        p2_gender:
          type: string
          example: M
        p2_level:
          type: integer
          example: 6
        p3_name:
          type: string
          example: Sofia P.
        p3_gender:
          type: string
          example: F
        p3_level:
          type: integer
          example: 4
        p4_name:
          type: string
          example: Fiona C.
        p4_gender:
          type: string
          example: F
        p4_level:
          type: integer
          example: 5
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Description of the error condition.
      required:
        - error
  responses:
    Unauthorized:
      description: Access token is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Access token is invalid or expired.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    AdminRequired:
      description: Admin permission level is required to call this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
