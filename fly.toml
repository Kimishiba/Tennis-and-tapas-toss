# fly.toml app configuration file generated for tennis-tapas-toss-mag on 2026-06-08T11:51:28+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tennis-tapas-toss-mag'
primary_region = 'ams'

[build]

[processes]
  app = 'node server.js'

[[mounts]]
  source = 'toss_data'
  destination = '/app/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
